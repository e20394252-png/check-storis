services:
  - type: web
    name: check-storis
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: check-storis-db
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: NEXT_PUBLIC_MINI_APP_URL
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: ADMIN_CHAT_ID
        sync: false

databases:
  - name: check-storis-db
    plan: free
    databaseName: checkstoris
    user: checkstoris
